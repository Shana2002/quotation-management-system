name: Deploy to HestiaCP

# Auto-deploy QMS whenever main is updated.
# Files are pushed to the server with rsync over SSH (only changed files transfer).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SSH_PRIVATE_KEY  Private key (PEM) whose public key is in the server user's ~/.ssh/authorized_keys
#   SSH_HOST         Server hostname or IP (e.g. qms.example.com)
#   SSH_USER         HestiaCP domain user that owns ~/web/<domain>/public_html
#   DEPLOY_PATH      Absolute project root on the server, e.g. /home/admin/web/qms.example.com/public_html
# Optional secrets / vars:
#   SSH_PORT         SSH port (defaults to 22 if unset)
#   SSH_KNOWN_HOSTS  Output of `ssh-keyscan -H <host>` to pin the host key (recommended)

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never interrupt an in-flight deploy

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.SSH_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -p "${SSH_PORT:-22}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null
          fi
          chmod 644 ~/.ssh/known_hosts
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}

      - name: Deploy with rsync
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${SSH_PORT:-22}" \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='node_modules/' \
            --exclude='config/database.local.php' \
            --exclude='libs/tcpdf/' \
            --exclude='storage/**' \
            --exclude='public/assets/uploads/**' \
            --exclude='*.md' \
            --exclude='scripts/' \
            --exclude='.gitignore' \
            --exclude='.env' \
            ./ "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Fix permissions on writable dirs
        env:
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "${SSH_PORT:-22}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "cd '${{ secrets.DEPLOY_PATH }}' && \
             mkdir -p storage public/assets/uploads && \
             chmod -R 775 storage public/assets/uploads"
